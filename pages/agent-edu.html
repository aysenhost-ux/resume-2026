<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧教学Agent - 任壮志 Portfolio</title>
<link rel="stylesheet" href="../shared.css">
<style>
html {
  overflow: auto;
  height: auto;
}
body {
  overflow-y: auto;
  overflow-x: hidden;
  height: auto;
  width: 100%;
  max-width: 100vw;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
body::-webkit-scrollbar {
  display: none;
}
.detail-page {
  min-height: 100vh;
  background-image: url('../image/Agent-bg.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  position: relative;
}
.detail-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 2rem;
  padding: 0 clamp(20px, 6vw, 120px);
  backdrop-filter: blur(20px);
  background: rgba(10,14,26,0.8);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-family: 'GeistMono', monospace;
  font-size: clamp(0.9rem, 1.1vw, 1.1rem);
  color: var(--muted);
  text-decoration: none;
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: transparent;
  transition: all 0.3s;
}
.back-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-glow);
}
.back-btn .arrow-left {
  width: 10px;
  height: 10px;
  border-left: 2px solid currentColor;
  border-bottom: 2px solid currentColor;
  transform: rotate(45deg);
}
.detail-title {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.2rem, 1.5vw, 1.6rem);
  font-weight: 700;
}
.detail-tag {
  display: inline-flex;
  align-items: center;
  background: var(--accent-glow);
  color: var(--accent);
  font-size: clamp(0.8rem, 0.9vw, 1rem);
  padding: 0.4rem 1.1rem;
  border-radius: 999px;
  font-family: 'GeistMono', monospace;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.detail-content {
  padding-top: 120px;
  padding-bottom: 60px;
  padding-left: clamp(40px, 6vw, 120px);
  padding-right: clamp(40px, 6vw, 120px);
  box-sizing: border-box;
  width: 100%;
  max-width: 100%;
}
.detail-gallery {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.detail-gallery img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0;
  padding: 0;
}
</style>
</head>
<body>
<div class="detail-page">
  <div class="detail-header">
    <a href="../index.html?panel=4" class="back-btn">
      <span class="arrow-left"></span>
      返回作品集
    </a>
    <h1 class="detail-title">智慧教学Agent</h1>
    <span class="detail-tag">产品方案</span>
  </div>
  
  <div class="detail-content">
    <div class="detail-gallery">
      <img draggable="false" src="../image/智慧教学Agent/画板16.png" alt="智慧教学Agent">
      <img draggable="false" src="../image/智慧教学Agent/画板17.png" alt="智慧教学Agent">
      <img draggable="false" src="../image/智慧教学Agent/画板18.png" alt="智慧教学Agent">
      <img draggable="false" src="../image/智慧教学Agent/画板19.png" alt="智慧教学Agent">
      <img draggable="false" src="../image/智慧教学Agent/画板20.png" alt="智慧教学Agent">
    </div>
  </div>
</div>

<script>
document.addEventListener('contextmenu', function(e) {
  if (e.target.tagName === 'IMG') {
    e.preventDefault();
  }
});
</script>
</body>
</html>
